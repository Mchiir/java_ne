spring.application.name=utility-billing-system
server.port=8888

# ===== PostgreSQL datasource =====
spring.datasource.url=jdbc:postgresql://localhost:5432/utility_billing_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== Swagger / OpenAPI =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# ===== JWT =====
# Base64-encoded 512-bit secret (HS512)
app.jwt.secret=${JWT_SECRET:}
# 1 hour
app.jwt.expiration-ms=3600000

# ===== Default seeded data (created on first boot) =====
app.admin.email=admin@utilitybilling.com
app.admin.password=Admin@123
app.admin.full-names=System Administrator
app.admin.phone=+250781234567

# ===== Email (Gmail SMTP) =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Master switch + sender identity. Set app.mail.enabled=false to skip sending (dev/offline).
app.mail.enabled=true
app.mail.from=no-reply@utilitybilling.rw

# ===== OTP (login codes, password-reset codes, email-verification codes) =====
app.otp.length=6
app.otp.expiry-minutes=15