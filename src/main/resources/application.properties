spring.application.name=billing

# Local secrets (DB + mail passwords) live in an untracked file so they are NOT
# committed to git. See application-secret.properties.example. Values there override
# the placeholders below.
spring.config.import=optional:file:./application-secret.properties

# ===== PostgreSQL datasource =====
spring.datasource.url=jdbc:postgresql://localhost:5432/utility_billing
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== Swagger / OpenAPI =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
# Sort tag groups + operations alphabetically so "Authentication" appears at the top.
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# ===== JWT =====
# Base64-encoded 512-bit secret (HS512). Replace in production.
app.jwt.secret=bXktc3VwZXItc2VjdXJlLXV0aWxpdHktYmlsbGluZy1qd3Qtc2lnbmluZy1rZXktY2hhbmdlLW1lLTIwMjYtd2FzYWMtcmVn
app.jwt.expiration-ms=86400000

# ===== Default seeded admin (created on first boot) =====
app.admin.email=admin@utility.rw
app.admin.password=Admin@123
app.admin.full-names=System Administrator
app.admin.phone=+250780000000

# ===== Email (Gmail SMTP) =====
# Use a Gmail App Password (Google Account > Security > 2-Step Verification > App passwords),
# NOT your normal Gmail password. Prefer setting these via environment variables.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:rutagandasalim@gmail.com}
spring.mail.password=${MAIL_PASSWORD:CHANGE_ME_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Master switch + sender identity. Set app.mail.enabled=false to skip sending (dev/offline).
app.mail.enabled=true
app.mail.from=${MAIL_USERNAME:rutagandasalim@gmail.com}

# ===== OTP (login codes, password-reset codes, email-verification codes) =====
app.otp.length=6
app.otp.expiry-minutes=15
